name: Release Artifacts (main)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_shared-build.yml
    with:
      publish: true
    secrets: inherit

  publish-release-assets:
    name: Publish rolling main release assets
    runs-on: ubuntu-latest
    needs: release
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download executable artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sandy-bun-*
          merge-multiple: true
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -maxdepth 1 -type f -exec cp {} release-assets/ \;

      - name: Publish rolling release
        run: |
          if gh release view main-build --repo "$REPO" >/dev/null 2>&1; then
            gh release upload main-build release-assets/* --clobber --repo "$REPO"
            gh release edit main-build --repo "$REPO" --title "Main build" --latest=false --target "${{ github.sha }}"
          else
            gh release create main-build release-assets/* --repo "$REPO" --title "Main build" --notes "" --prerelease --latest=false --target "${{ github.sha }}"
          fi
