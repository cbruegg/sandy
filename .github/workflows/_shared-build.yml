name: Shared Build Pipeline

on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean

jobs:
  build-executables:
    name: ${{ inputs.publish && 'Publish executable' || 'Build executable' }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
          - bun-windows-x64
          - bun-windows-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Matrix crypto binary for compile target
        run: bun ./scripts/prepare-matrix-crypto-binary.mjs --target "${{ matrix.target }}"

      - name: Build single-file executables
        run: |
          mkdir -p bin
          EXT=""
          if [[ "${{ matrix.target }}" == bun-windows-* ]]; then
            EXT=".exe"
          fi
          bun ./scripts/build-with-constants.mjs --compile --target="${{ matrix.target }}" --outfile "bin/sandy-${{ matrix.target }}${EXT}" --sourcemap \
            --define "SANDY_BUILD_GIT_REVISION='${{ github.sha }}'" \
            --define "SANDY_BUILD_IMAGE_REGISTRY='ghcr.io/${{ github.repository_owner }}'" \
            --define "SANDY_BUILD_GITHUB_REPOSITORY='${{ github.repository }}'" \
            --define "SANDY_BUILD_UPDATE_RELEASE_TAG='main-build'" \
            ./src/entrypoint-main.ts
          bun ./scripts/build-with-constants.mjs --compile --target="${{ matrix.target }}" --outfile "bin/sandy-updater-${{ matrix.target }}${EXT}" --sourcemap \
            --define "SANDY_BUILD_GIT_REVISION='${{ github.sha }}'" \
            --define "SANDY_BUILD_IMAGE_REGISTRY='ghcr.io/${{ github.repository_owner }}'" \
            --define "SANDY_BUILD_GITHUB_REPOSITORY='${{ github.repository }}'" \
            --define "SANDY_BUILD_UPDATE_RELEASE_TAG='main-build'" \
            ./src/entrypoint-updater.ts

      - name: Package executable bundle
        run: |
          mkdir -p release-bundles
          zip -j "release-bundles/sandy-${{ matrix.target }}.zip" \
            "bin/sandy-${{ matrix.target }}"* \
            "bin/sandy-updater-${{ matrix.target }}"*

      - name: Upload executable artifact
        if: inputs.publish
        uses: actions/upload-artifact@v7
        with:
          name: sandy-${{ matrix.target }}
          path: release-bundles/sandy-${{ matrix.target }}.zip
          if-no-files-found: error

  build-docker-images:
    name: ${{ inputs.publish && 'Publish image' || 'Build image' }} (${{ matrix.image }}-${{ matrix.platform_slug }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: worker-runtime
            image: sandy-subagent
            platform: linux/amd64
            platform_slug: amd64
            runner: ubuntu-24.04
          - target: worker-runtime
            image: sandy-subagent
            platform: linux/arm64
            platform_slug: arm64
            runner: ubuntu-24.04-arm
          - target: mcp-proxy-runtime
            image: sandy-mcp-proxy
            platform: linux/amd64
            platform_slug: amd64
            runner: ubuntu-24.04
          - target: mcp-proxy-runtime
            image: sandy-mcp-proxy
            platform: linux/arm64
            platform_slug: arm64
            runner: ubuntu-24.04-arm
          - target: network-guard-runtime
            image: sandy-network-guard
            platform: linux/amd64
            platform_slug: amd64
            runner: ubuntu-24.04
          - target: network-guard-runtime
            image: sandy-network-guard
            platform: linux/arm64
            platform_slug: arm64
            runner: ubuntu-24.04-arm
          - target: http-proxy-runtime
            image: sandy-http-proxy
            platform: linux/amd64
            platform_slug: amd64
            runner: ubuntu-24.04
          - target: http-proxy-runtime
            image: sandy-http-proxy
            platform: linux/arm64
            platform_slug: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: inputs.publish
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.image }} image for ${{ matrix.platform }} (no push)
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            SANDY_BUILD_GIT_REVISION=${{ github.sha }}
            SANDY_BUILD_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}
            SANDY_BUILD_GITHUB_REPOSITORY=${{ github.repository }}
            SANDY_BUILD_UPDATE_RELEASE_TAG=main-build

      - name: Build and push ${{ matrix.image }} image by digest
        if: inputs.publish
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          build-args: |
            SANDY_BUILD_GIT_REVISION=${{ github.sha }}
            SANDY_BUILD_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}
            SANDY_BUILD_GITHUB_REPOSITORY=${{ github.repository }}
            SANDY_BUILD_UPDATE_RELEASE_TAG=main-build
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        if: inputs.publish
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        if: inputs.publish
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error

  publish-docker-manifests:
    name: Publish manifest (${{ matrix.image }})
    if: inputs.publish
    runs-on: ubuntu-latest
    needs: build-docker-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sandy-subagent
          - image: sandy-mcp-proxy
          - image: sandy-network-guard
          - image: sandy-http-proxy
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Create and push multi-arch manifest
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t metadata_tags < <(jq -r '.tags[]' <<<"$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${metadata_tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          refs=()
          for digest in /tmp/digests/*; do
            refs+=("$IMAGE_NAME@sha256:$(basename "$digest")")
          done

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"
