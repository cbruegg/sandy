name: Shared Build Pipeline

on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean

jobs:
  build-executables:
    name: ${{ inputs.publish && 'Publish executable' || 'Build executable' }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
          - bun-windows-x64
          - bun-windows-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bake Sandy image metadata into executable build
        if: inputs.publish
        run: |
          cat > src/build-metadata.generated.ts <<EOF
          // Overwritten by the GitHub executable build job to embed release image defaults.
          export const embeddedBuildMetadata = {
            gitRevision: '${{ github.sha }}',
            imageRegistry: 'ghcr.io/${{ github.repository_owner }}',
            githubRepository: '${{ github.repository }}',
            updateReleaseTag: 'main-build',
          } as const;
          EOF

      - name: Build single-file executables
        run: |
          mkdir -p bin
          EXT=""
          if [[ "${{ matrix.target }}" == bun-windows-* ]]; then
            EXT=".exe"
          fi
          bun build --compile --target="${{ matrix.target }}" --outfile "bin/sandy-${{ matrix.target }}${EXT}" ./src/entrypoint-main.ts
          bun build --compile --target="${{ matrix.target }}" --outfile "bin/sandy-updater-${{ matrix.target }}${EXT}" ./src/entrypoint-updater.ts

      - name: Package executable bundle
        run: |
          mkdir -p release-bundles
          zip -j "release-bundles/sandy-${{ matrix.target }}.zip" \
            "bin/sandy-${{ matrix.target }}"* \
            "bin/sandy-updater-${{ matrix.target }}"*

      - name: Upload executable artifact
        if: inputs.publish
        uses: actions/upload-artifact@v7
        with:
          name: sandy-${{ matrix.target }}
          path: release-bundles/sandy-${{ matrix.target }}.zip
          if-no-files-found: error

  build-docker-images:
    name: ${{ inputs.publish && 'Publish Docker image' || 'Build Docker image' }} (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: worker-runtime
            image: sandy-subagent
          - target: mcp-proxy-runtime
            image: sandy-mcp-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: inputs.publish
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: inputs.publish
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build ${{ matrix.image }} image for all platforms (no push)
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: false

      - name: Build and push ${{ matrix.image }} image
        if: inputs.publish
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
